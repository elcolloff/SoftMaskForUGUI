name: 🧪 Test
run-name: 🧪 Test (${{ github.event.pull_request.title || github.ref_name }})
env:
  MINIMUM_VERSION: 2019.4
  EXCLUDE_FILTER: (2017|2018|2023.3)
  PROJECT_PATH: .
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  setup:
    name: ⚙️ Setup
    runs-on: ubuntu-latest
    outputs:
      unityVersions: ${{ steps.setup.outputs.unityVersions }}
    steps:
    - name: ⚙️ Find target Unity versions
      id: setup
      run: |
        echo "==== Target Unity Versions ===="
        LATEST_VERSIONS=`npx unity-changeset@latest list --versions --latest-patch --min ${MINIMUM_VERSION} --json --all`
        if [ "${{ inputs.usePeriodVersions }}" = "true" ]; then
          ADDITIONAL_VERSIONS=`npx unity-changeset list --versions --grep '0f' --min ${MINIMUM_VERSION} --json`
        else
          ADDITIONAL_VERSIONS=[]
        fi

        VERSIONS=`echo "[${LATEST_VERSIONS}, ${ADDITIONAL_VERSIONS}]" \
          | jq -c '[ flatten | sort | unique | .[] | select( test("${{ env.EXCLUDE_FILTER }}") | not ) ]'`
        echo "unityVersions=${VERSIONS}" | tee $GITHUB_OUTPUT
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        unityVersion: ${{ fromJson(needs.setup.outputs.unityVersions) }}
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: pull_request_target triggered"
        printf 'GARALT_DBG: head SHA = %s\n' "${{ github.event.pull_request.head.sha }}"
        printf 'GARALT_DBG: base SHA = %s\n' "${{ github.event.pull_request.base.sha }}"
        printf 'GARALT_DBG: head ref = %s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: head repo = %s\n' "${{ github.event.pull_request.head.repo.full_name }}"
      continue-on-error: true
    - name: 🚚 Checkout pull request (pull_request_target)
      if: github.event_name == 'pull_request_target'
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
    - name: 🚚 Marge pull request (pull_request_target)
      if: github.event_name == 'pull_request_target'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git rebase ${{ github.event.pull_request.base.sha }}
        git log --oneline -n 10
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: About to run Unity Builder (sink)"
        echo "GARALT_DBG: PWD=$(pwd 2>/dev/null || echo 'unknown')"
        echo "GARALT_DBG: Workspace contents:"
        ls -la . 2>/dev/null || echo "(cannot list workspace)"
        echo "GARALT_DBG: Checking for C# scripts:"
        find . -name '*.cs' -maxdepth 3 2>/dev/null | head -20 || echo "(no .cs files found or cannot traverse)"
        echo "GARALT_DBG: UNITY_EMAIL secret is present: ${{ secrets.UNITY_EMAIL != '' && 'YES' || 'NO' }}"
        echo "GARALT_DBG: UNITY_PASSWORD secret is present: ${{ secrets.UNITY_PASSWORD != '' && 'YES' || 'NO' }}"
        echo "GARALT_DBG: UNITY_LICENSE secret is present: ${{ secrets.UNITY_LICENSE != '' && 'YES' || 'NO' }}"
      continue-on-error: true
    - name: 🛠️ Build Unity Project (Test)
      uses: game-ci/unity-builder@main
      timeout-minutes: 45
      with:
        customImage: ghcr.io/mob-sakai/unity3d:${{ matrix.unityVersion }}
        targetPlatform: StandaloneLinux64
        allowDirtyBuild: true
        customParameters: -nographics
        projectPath: ${{ env.PROJECT_PATH }}
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    - name: 🧪 Run tests
      uses: game-ci/unity-test-runner@v4
      timeout-minutes: 45
      with:
        customImage: ghcr.io/mob-sakai/unity3d:${{ matrix.unityVersion }}
        customParameters: -nographics
        checkName: ${{ matrix.unityVersion }} Test Results
        githubToken: ${{ github.token }}
        projectPath: ${{ env.PROJECT_PATH }}
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
on:
  workflow_dispatch:
    inputs:
      usePeriodVersions:
        description: Use the period versions (.0f1, .10f1, 20f1, ...).
        required: false
        default: 'true'
  push:
    branches:
    - develop
    - develop-*
    tags:
    - '!*'
    paths-ignore:
    - '**.md'
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
    paths-ignore:
    - '**.md'
