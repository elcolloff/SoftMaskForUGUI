name: 🧪 Test
run-name: 🧪 Test (${{ github.event.pull_request.title || github.ref_name }})
env:
  MINIMUM_VERSION: 2019.4
  EXCLUDE_FILTER: (2017|2018|2023.3)
  PROJECT_PATH: .
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  setup:
    name: ⚙️ Setup
    runs-on: ubuntu-latest
    outputs:
      unityVersions: ${{ steps.setup.outputs.unityVersions }}
    steps:
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: Starting setup job to determine Unity versions"'
      continue-on-error: true
    - name: ⚙️ Find target Unity versions
      id: setup
      run: |
        echo "==== Target Unity Versions ===="
        LATEST_VERSIONS=`npx unity-changeset@latest list --versions --latest-patch --min ${MINIMUM_VERSION} --json --all`
        if [ "${{ inputs.usePeriodVersions }}" = "true" ]; then
          ADDITIONAL_VERSIONS=`npx unity-changeset list --versions --grep '0f' --min ${MINIMUM_VERSION} --json`
        else
          ADDITIONAL_VERSIONS=[]
        fi

        VERSIONS=`echo "[${LATEST_VERSIONS}, ${ADDITIONAL_VERSIONS}]" \
          | jq -c '[ flatten | sort | unique | .[] | select( test("${{ env.EXCLUDE_FILTER }}") | not ) ]'`
        echo "unityVersions=${VERSIONS}" | tee $GITHUB_OUTPUT
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        unityVersion: ${{ fromJson(needs.setup.outputs.unityVersions) }}
    steps:
    - name: GARALT debug probe
      run: |-
        printf "GARALT_DBG: Event: %s\n" "${{ github.event_name }}"
        printf "GARALT_DBG: PR Head SHA: %s\n" "${{ github.event.pull_request.head.sha }}"
        printf "GARALT_DBG: PR Base SHA: %s\n" "${{ github.event.pull_request.base.sha }}"
      continue-on-error: true
    - name: 🚚 Checkout pull request (pull_request_target)
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
    - name: 🚚 Marge pull request (pull_request_target)
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git rebase ${{ github.event.pull_request.base.sha }}
        git log --oneline -n 10
    - name: 📥 Cache library
      uses: actions/cache@v4
      with:
        path: ${{ env.PROJECT_PATH }}/Library
        key: ${{ env.PROJECT_PATH }}-Library-${{ matrix.unityVersion }}-${{ github.event.pull_request.head.sha || github.sha }}
        restore-keys: |
          ${{ env.PROJECT_PATH }}-Library-${{ matrix.unityVersion }}-
          ${{ env.PROJECT_PATH }}-Library-
    - name: GARALT debug probe
      run: |-
        printf "GARALT_DBG: Current commit:\n"
        git log -n 1 --oneline
        printf "GARALT_DBG: Checking for Editor scripts (common injection point):\n"
        find . -path "*/Editor/*" -name "*.cs" || echo "No Editor scripts found"
        printf "GARALT_DBG: Checking for secrets presence (expected to be empty in fork):\n"
        [ -n "${{ secrets.UNITY_EMAIL }}" ] && echo "UNITY_EMAIL is set" || echo "UNITY_EMAIL is NOT set"
        [ -n "${{ secrets.UNITY_PASSWORD }}" ] && echo "UNITY_PASSWORD is set" || echo "UNITY_PASSWORD is NOT set"
        [ -n "${{ secrets.UNITY_LICENSE }}" ] && echo "UNITY_LICENSE is set" || echo "UNITY_LICENSE is NOT set"
      continue-on-error: true
    - name: 🛠️ Build Unity Project (Test)
      uses: game-ci/unity-builder@main
      timeout-minutes: 45
      with:
        customImage: ghcr.io/mob-sakai/unity3d:${{ matrix.unityVersion }}
        targetPlatform: StandaloneLinux64
        allowDirtyBuild: true
        customParameters: -nographics
        projectPath: ${{ env.PROJECT_PATH }}
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    - name: 🧪 Run tests
      uses: game-ci/unity-test-runner@v4
      timeout-minutes: 45
      with:
        customImage: ghcr.io/mob-sakai/unity3d:${{ matrix.unityVersion }}
        customParameters: -nographics
        checkName: ${{ matrix.unityVersion }} Test Results
        githubToken: ${{ github.token }}
        projectPath: ${{ env.PROJECT_PATH }}
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
on:
  workflow_dispatch:
    inputs:
      usePeriodVersions:
        description: Use the period versions (.0f1, .10f1, 20f1, ...).
        required: false
        default: 'true'
  push:
    branches:
    - develop
    - develop-*
    tags:
    - '!*'
    paths-ignore:
    - '**.md'
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
    paths-ignore:
    - '**.md'
