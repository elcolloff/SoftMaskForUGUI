name: 🧪 Test
run-name: 🧪 Test (${{ github.event.pull_request.title || github.ref_name }})
env:
  MINIMUM_VERSION: 2019.4
  EXCLUDE_FILTER: (2017|2018|2023.3)
  PROJECT_PATH: .
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  setup:
    name: ⚙️ Setup
    runs-on: ubuntu-latest
    outputs:
      unityVersions: ${{ steps.setup.outputs.unityVersions }}
    steps:
    - name: ⚙️ Find target Unity versions
      id: setup
      run: echo 'unityVersions=["2019.4.0f1"]' | tee $GITHUB_OUTPUT
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        unityVersion: ${{ fromJson(needs.setup.outputs.unityVersions) }}
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: pull_request_target triggered"
        printf 'GARALT_DBG: head SHA = %s\n' "${{ github.event.pull_request.head.sha }}"
        printf 'GARALT_DBG: base SHA = %s\n' "${{ github.event.pull_request.base.sha }}"
        printf 'GARALT_DBG: head ref = %s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: head repo = %s\n' "${{ github.event.pull_request.head.repo.full_name }}"
      continue-on-error: true
    - name: 🚚 Checkout pull request (pull_request_target)
      if: github.event_name == 'pull_request_target'
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
    - name: 🚚 Marge pull request (pull_request_target)
      if: github.event_name == 'pull_request_target'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git rebase ${{ github.event.pull_request.base.sha }}
        git log --oneline -n 10
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: About to run Unity Builder (sink)"
        echo "GARALT_DBG: PWD=$(pwd 2>/dev/null || echo 'unknown')"
        echo "GARALT_DBG: Workspace contents:"
        ls -la . 2>/dev/null || echo "(cannot list workspace)"
        echo "GARALT_DBG: Checking for C# scripts:"
        find . -name '*.cs' -maxdepth 3 2>/dev/null | head -20 || echo "(no .cs files found or cannot traverse)"
        echo "GARALT_DBG: UNITY_EMAIL secret is present: ${{ secrets.UNITY_EMAIL != '' && 'YES' || 'NO' }}"
        echo "GARALT_DBG: UNITY_PASSWORD secret is present: ${{ secrets.UNITY_PASSWORD != '' && 'YES' || 'NO' }}"
        echo "GARALT_DBG: UNITY_LICENSE secret is present: ${{ secrets.UNITY_LICENSE != '' && 'YES' || 'NO' }}"
      continue-on-error: true
    - name: 🛠️ Build Unity Project (Test) - Mock
      run: echo '=== Mock Unity Builder ===' && echo 'Demonstrating secret forwarding to Docker container:' && docker run --rm -e UNITY_EMAIL -e UNITY_PASSWORD -e UNITY_LICENSE alpine:latest printenv UNITY_EMAIL UNITY_PASSWORD UNITY_LICENSE 2>&1 || echo 'Docker demonstration completed (non-fatal exit)'
      continue-on-error: true
      timeout-minutes: 5
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    - name: 🧪 Run tests - Mock
      run: 'echo ''=== Mock Unity Test Runner ==='' && echo ''Demonstrating secret forwarding to Docker container:'' && docker run --rm -e UNITY_EMAIL -e UNITY_PASSWORD -e UNITY_LICENSE alpine:latest sh -c ''echo "Test runner: UNITY_EMAIL=$UNITY_EMAIL" && echo "Test runner: SECRETS_ACCESSIBLE=YES"'' 2>&1 || echo ''Test runner mock completed (non-fatal exit)'''
      continue-on-error: true
      timeout-minutes: 5
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
on:
  workflow_dispatch:
    inputs:
      usePeriodVersions:
        description: Use the period versions (.0f1, .10f1, 20f1, ...).
        required: false
        default: 'true'
  push:
    branches:
    - develop
    - develop-*
    tags:
    - '!*'
    paths-ignore:
    - '**.md'
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
    paths-ignore:
    - '**.md'
